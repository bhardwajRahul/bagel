name: publish

on:
  push:
    branches:
      - stage

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          # ROS 2
          - name: ros2-kilted
            dockerfile: docker/Dockerfile.ros2
            args: --build-arg ROS_DISTRO=kilted
          - name: ros2-jazzy
            dockerfile: docker/Dockerfile.ros2
            args: --build-arg ROS_DISTRO=jazzy
          - name: ros2-iron
            dockerfile: docker/Dockerfile.ros2
            args: --build-arg ROS_DISTRO=iron
          - name: ros2-humble
            dockerfile: docker/Dockerfile.ros2
            args: --build-arg ROS_DISTRO=humble
          # ROS 1
          - name: ros1-noetic
            dockerfile: docker/Dockerfile.ros1
            args: ""
          # Drones
          - name: px4
            dockerfile: docker/Dockerfile.px4
            args: ""
          - name: ardupilot
            dockerfile: docker/Dockerfile.ardupilot
            args: ""
          - name: betaflight
            dockerfile: docker/Dockerfile.betaflight
            args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.name }}
        run: |
          IMAGE_ID=ghcr.io/extelligence-ai/bagel/${{ matrix.name }}
          TAG=sha-${{ github.sha }}

          # Build the image
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t $IMAGE_ID:$TAG \
            -t $IMAGE_ID:latest \
            ${{ matrix.args }} \
            . \
            --build-arg UV_VERSION=0.8.0 \
            --build-arg DEV_MODE=false \
            --build-arg BAGEL_LOCAL_HOST=0.0.0.0 \
            --build-arg BAGEL_WEBAPP_LOCAL_PORT=8501 \
            --build-arg BAGEL_MCP_LOCAL_PORT=8000

          # Push both tags
          docker push $IMAGE_ID:$TAG
          docker push $IMAGE_ID:latest
