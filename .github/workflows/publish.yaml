name: publish

on:
  push:
    branches:
      - stage

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          # ROS
          - service: ros2-kilted
          - service: ros2-jazzy
          - service: ros2-iron
          - service: ros2-humble
          - service: ros1-noetic
          - service: ros1-noetic-cv
          # Drones
          - service: px4
          - service: ardupilot
          - service: betaflight
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/lib/jvm
      - name: Build ${{ matrix.service }}
        run: docker compose build ${{ matrix.service }}
      - name: Push ${{ matrix.service }}
        run: |
          IMAGE=ghcr.io/extelligence-ai/bagel/${{ matrix.service }}
          TAG=sha-${{ github.sha }}
          docker tag $IMAGE:latest $IMAGE:$TAG
          docker push $IMAGE:latest
          docker push $IMAGE:$TAG
